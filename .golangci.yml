version: '2'

linters:
  default: all
  disable:
    - depguard
    - err113
    - exhaustive
    - exhaustruct
    - forcetypeassert
    - gochecknoglobals
    - gocyclo
    - gosec
    - godox
    - mnd
    - nlreturn
    - noinlineerr
    - nonamedreturns
    - paralleltest
    - varnamelen
    - wrapcheck
    - wsl
    - wsl_v5
  settings:
    cyclop:
      max-complexity: 20
    funlen:
      # Complexity is already covered by cyclop and gocognit.
      statements: -1
    govet:
      enable-all: true
      disable: [fieldalignment]
    revive:
      enable-all-rules: true
      rules:
        - name: line-length-limit
          disabled: true # covered by lll
        - name: function-length
          disabled: true # covered by funlen
        - name: cognitive-complexity
          disabled: true # covered by gocognit
        - name: cyclomatic
          disabled: true # covered by cyclop
        - name: add-constant
          disabled: true # covered by goconst/mnd
        - name: unnecessary-format
          disabled: true # covered by perfsprint
        - name: enforce-switch-style
          disabled: true
    nolintlint:
      require-specific: true
  exclusions:
    generated: lax
    presets:
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
          - funlen
          - gocognit
          - maintidx
        path: (.+)_test.go
      - linters: [govet]
        text: 'shadow: declaration of "err" shadows declaration'
    paths:
      - testdata

formatters:
  enable:
    - gofmt
    - gofumpt
    - goimports
    - golines
  settings:
    gofmt:
      rewrite-rules:
        - pattern: interface{}
          replacement: any
    gofumpt:
      extra-rules: true
    golines:
      max-len: 120
      tab-len: 2
